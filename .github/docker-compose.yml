services:
 
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: weatherdb
      POSTGRES_USER: weatheruser
      POSTGRES_PASSWORD: weatherpass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weatheruser -d weatherdb"]
      interval: 5s
      timeout: 5s
      retries: 10
 
  rest-api:
    build: ./rest-api
    ports:
      - "6000:6000"
    environment:
      DB_HOST: db
      DB_NAME: weatherdb
      DB_USER: weatheruser
      DB_PASSWORD: weatherpass
      DB_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
 
  transformer:
    build: ./transformer
    ports:
      - "5000:5000"
    environment:
      REST_API_URL: http://rest-api:6000
    depends_on:
      - rest-api
 
  sampler:
    build: ./sampler
    ports:
      - "3000:3000"
    environment:
      TRANSFORMER_URL: http://transformer:5000
    depends_on:
      - transformer
 
  sensor:
    build: ./sensor
    environment:
      SAMPLER_URL: http://sampler:3000
    depends_on:
      - sampler
 
volumes:
  db_data: